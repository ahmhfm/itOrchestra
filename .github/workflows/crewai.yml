# itOrchestra - CI/CD for the CrewAI orchestration service (Python, Phase 0.10) using the Phase
# 0.11 pipeline. Adds a proto contract gate (buf lint + breaking) ahead of the Python CI.
# PR: proto + lint/test + build image. main/tags: + push to GHCR, sign, SBOM, then dev -> staging
# -> prod (staging/prod gated by their GitHub Environment).
name: crewai

on:
  push:
    branches: [main]
    tags: ['v*']
    paths: &paths
      - 'platform/crewai/**'
      - 'buf.yaml'
      - 'platform/charts/itorchestra-service/**'
      - 'platform/deploy/crewai/**'
      - '.github/workflows/crewai.yml'
      - '.github/workflows/ci-python.yml'
      - '.github/workflows/ci-proto.yml'
      - '.github/workflows/cd-helm.yml'
      - '.github/actions/image-supply-chain/**'
  pull_request:
    paths: *paths

# Caller-level cap: a reusable workflow's job permissions cannot exceed these. The image job needs
# packages:write (GHCR) + id-token:write (Cosign keyless OIDC), so they must be granted here.
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.m.outputs.tag }}
      push: ${{ steps.m.outputs.push }}
      image: ${{ steps.m.outputs.image }}
    steps:
      - id: m
        run: |
          echo "tag=sha-$(echo '${{ github.sha }}' | cut -c1-12)" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/itorchestra-crewai" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" != "pull_request" ] && { [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; }; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

  proto:
    uses: ./.github/workflows/ci-proto.yml
    secrets: inherit

  ci:
    needs: [prep, proto]
    uses: ./.github/workflows/ci-python.yml
    with:
      service: crewai
      context: platform/crewai
      dockerfile: platform/crewai/Dockerfile
      image: ${{ needs.prep.outputs.image }}
      tag: ${{ needs.prep.outputs.tag }}
      push: ${{ needs.prep.outputs.push == 'true' }}
    secrets: inherit

  deploy-dev:
    needs: [prep, ci]
    if: ${{ needs.prep.outputs.push == 'true' }}
    uses: ./.github/workflows/cd-helm.yml
    with:
      environment: dev
      chart: platform/charts/itorchestra-service
      release: crewai
      namespace: ns-crewai
      values-file: platform/deploy/crewai/values-dev.yaml
      image: ${{ needs.prep.outputs.image }}
      tag: ${{ needs.prep.outputs.tag }}
      apply: true
      runner: ${{ vars.DEPLOY_RUNNER || 'ubuntu-latest' }}
    secrets: inherit

  deploy-staging:
    needs: [prep, deploy-dev]
    uses: ./.github/workflows/cd-helm.yml
    with:
      environment: staging
      chart: platform/charts/itorchestra-service
      release: crewai
      namespace: ns-crewai
      values-file: platform/deploy/crewai/values-staging.yaml
      image: ${{ needs.prep.outputs.image }}
      tag: ${{ needs.prep.outputs.tag }}
      apply: true
      runner: ${{ vars.DEPLOY_RUNNER || 'ubuntu-latest' }}
    secrets: inherit

  deploy-prod:
    needs: [prep, deploy-staging]
    uses: ./.github/workflows/cd-helm.yml
    with:
      environment: prod
      chart: platform/charts/itorchestra-service
      release: crewai
      namespace: ns-crewai
      values-file: platform/deploy/crewai/values-prod.yaml
      image: ${{ needs.prep.outputs.image }}
      tag: ${{ needs.prep.outputs.tag }}
      apply: true
      runner: ${{ vars.DEPLOY_RUNNER || 'ubuntu-latest' }}
    secrets: inherit
