# itOrchestra - reusable Protobuf contract CI (Phase 0.11).
# Lints every .proto module (buf.yaml) and enforces backward-compatibility by diffing the change
# against the default branch. A PR that renumbers/removes a field or breaks wire/JSON compat
# fails here, satisfying the "breaking-change detection on Protobuf contracts" rule.
name: ci-proto

on:
  workflow_call:

permissions:
  contents: read

jobs:
  buf:
    name: buf lint + breaking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # full history so the breaking baseline (main) can be resolved

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Hard gate: contract hygiene must pass.
      - name: buf lint
        run: buf lint

      # Hard gate: no backward-incompatible contract change vs the default branch. The baseline is
      # fetched straight from the remote so it resolves reliably on both PR (detached HEAD) and push.
      - name: buf breaking (baseline = remote main)
        run: buf breaking --against "https://github.com/${{ github.repository }}.git#branch=main"
