# itOrchestra - reusable Protobuf contract CI (Phase 0.11).
# Lints every .proto module (buf.yaml) and enforces backward-compatibility by diffing the change
# against the default branch. A PR that renumbers/removes a field or breaks wire/JSON compat
# fails here, satisfying the "breaking-change detection on Protobuf contracts" rule.
name: ci-proto

on:
  workflow_call:

permissions:
  contents: read

jobs:
  buf:
    name: buf lint + breaking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so the breaking-change baseline can be resolved

      # buf-action runs lint + breaking and resolves the breaking baseline automatically: the PR
      # base on pull_request, and the parent commit on push (so it works in both, and is a no-op
      # on the very first commit). Format/BSR-push are disabled - this is a CI gate only.
      - uses: bufbuild/buf-action@v1
        with:
          lint: true
          format: false
          breaking: true
          push: false
          pr_comment: false
          github_token: ${{ secrets.GITHUB_TOKEN }}
