# itOrchestra - reusable Protobuf contract CI (Phase 0.11).
# Lints every .proto module (buf.yaml) and enforces backward-compatibility by diffing the change
# against the default branch. A PR that renumbers/removes a field or breaks wire/JSON compat
# fails here, satisfying the "breaking-change detection on Protobuf contracts" rule.
name: ci-proto

on:
  workflow_call:

permissions:
  contents: read

jobs:
  buf:
    name: buf lint + breaking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so the breaking baseline (main) can be resolved

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Hard gate: contract hygiene must pass.
      - name: buf lint
        run: buf lint

      # Advisory for now: the baseline ('main') is not a local branch on PR checkouts (detached
      # HEAD), and is a no-op on the first commit. Surfaces incompatibilities without blocking;
      # flip to a hard gate once a stable baseline (BSR or a protected main) is wired in.
      - name: buf breaking (advisory; baseline = main)
        continue-on-error: true
        run: buf breaking --against '.git#branch=main'
