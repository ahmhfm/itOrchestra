# itOrchestra - Dependabot (Phase 0.11). Automated dependency + vulnerability PRs across every
# ecosystem in the repo: GitHub Actions, NuGet (.NET services), pip (Python services), and the
# Dockerfiles. Grouped to keep PR noise low; security updates always open individually.
version: 2

updates:
  # --- GitHub Actions used by all workflows ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
    labels: ["dependencies", "ci"]

  # --- .NET: YARP API Gateway (Phase 0.3) ---
  - package-ecosystem: nuget
    directory: /platform/gateway
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dotnet:
        patterns: ["*"]
    labels: ["dependencies", "dotnet"]

  # --- Python: CrewAI orchestration service (Phase 0.10) ---
  - package-ecosystem: pip
    directory: /platform/crewai
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]
    # protobuf and grpcio must move together: grpcio-tools only supports the matching protobuf
    # minor line (e.g. grpcio 1.81 -> protobuf 6.x). A standalone protobuf MAJOR bump (e.g. 6 -> 7)
    # outruns the gRPC stack and makes `pip install` unresolvable, so we let the gRPC packages drive
    # protobuf and skip protobuf major-version updates until grpcio adds support.
    ignore:
      - dependency-name: protobuf
        update-types: ["version-update:semver-major"]
    labels: ["dependencies", "python"]

  # --- Docker base images ---
  - package-ecosystem: docker
    directory: /platform/gateway
    schedule:
      interval: weekly
    labels: ["dependencies", "docker"]
  - package-ecosystem: docker
    directory: /platform/crewai
    schedule:
      interval: weekly
    labels: ["dependencies", "docker"]
