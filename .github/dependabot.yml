# itOrchestra - Dependabot (Phase 0.11). Automated dependency + vulnerability PRs across every
# ecosystem in the repo: GitHub Actions, NuGet (.NET services), pip (Python services), and the
# Dockerfiles. Grouped to keep PR noise low; security updates always open individually.
version: 2

updates:
  # --- GitHub Actions used by all workflows ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
    labels: ["dependencies", "ci"]

  # --- .NET: YARP API Gateway (Phase 0.3) ---
  - package-ecosystem: nuget
    directory: /platform/gateway
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dotnet:
        patterns: ["*"]
    labels: ["dependencies", "dotnet"]

  # --- Python: CrewAI orchestration service (Phase 0.10) ---
  - package-ecosystem: pip
    directory: /platform/crewai
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]
    # The gRPC stack + protobuf are a tightly-coupled set: grpcio-tools only supports its matching
    # protobuf line, and bumping them drags pip's resolver into crewai's deep dependency tree
    # (we hit both ResolutionImpossible and resolution-too-deep when Dependabot raised them). They
    # are pinned by hand in requirements.txt and upgraded together after validating the full build,
    # so Dependabot is told to leave them alone here. It still bumps everything else (requests,
    # pymssql, crewai, litellm, ...).
    ignore:
      - dependency-name: protobuf
      - dependency-name: grpcio
      - dependency-name: grpcio-tools
      - dependency-name: grpcio-health-checking
      - dependency-name: grpcio-reflection
    labels: ["dependencies", "python"]

  # --- Docker base images ---
  - package-ecosystem: docker
    directory: /platform/gateway
    schedule:
      interval: weekly
    labels: ["dependencies", "docker"]
  - package-ecosystem: docker
    directory: /platform/crewai
    schedule:
      interval: weekly
    labels: ["dependencies", "docker"]
