# crewai (gRPC) - prod environment values. image.repository/tag injected by CD.
replicas: 3
containerPort: 50051
service:
  type: ClusterIP
  port: 50051
  portName: grpc
probes:
  type: grpc
  initialDelaySeconds: 40
  periodSeconds: 10
  failureThreshold: 6
envFrom:
  - configMapRef: { name: crewai-config }
  - secretRef: { name: crewai-secrets }
resources:
  requests: { cpu: "500m", memory: "768Mi" }
  limits:   { cpu: "2",    memory: "2Gi" }
