# crewai (gRPC) - staging environment values. image.repository/tag injected by CD.
replicas: 2
containerPort: 50051
service:
  type: ClusterIP
  port: 50051
  portName: grpc
probes:
  type: grpc
  initialDelaySeconds: 40
  periodSeconds: 15
  failureThreshold: 6
envFrom:
  - configMapRef: { name: crewai-config }
  - secretRef: { name: crewai-secrets }
resources:
  requests: { cpu: "250m", memory: "512Mi" }
  limits:   { cpu: "2",    memory: "1536Mi" }
