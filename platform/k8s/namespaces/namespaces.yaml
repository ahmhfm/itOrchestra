# itOrchestra platform + per-service namespaces (step 0.1).
#
# Conventions:
#   - label  name=<ns>                          -> used by NetworkPolicy namespaceSelectors
#   - annot. linkerd.io/inject: enabled          -> mesh sidecar injection (Linkerd installed in 0.2)
#   - label  pod-security.kubernetes.io/enforce  -> Pod Security Standard per namespace
#
# Per-service namespaces use the 'restricted' profile. Infra namespaces (vault, redis,
# keycloak, observability) use 'baseline' initially and can be tightened later.

# ---------- Edge / gateway ----------
apiVersion: v1
kind: Namespace
metadata:
  name: ns-gateway
  labels:
    name: ns-gateway
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
  annotations:
    linkerd.io/inject: enabled
---
# ---------- Per-service namespaces (microservices) ----------
apiVersion: v1
kind: Namespace
metadata:
  name: ns-identity
  labels:
    name: ns-identity
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
  annotations:
    linkerd.io/inject: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: ns-assets
  labels:
    name: ns-assets
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
  annotations:
    linkerd.io/inject: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: ns-discovery
  labels:
    name: ns-discovery
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
  annotations:
    linkerd.io/inject: enabled
---
# ---------- Shared infrastructure namespaces (filled in by later 0.x steps) ----------
apiVersion: v1
kind: Namespace
metadata:
  name: vault
  labels:
    name: vault
    pod-security.kubernetes.io/enforce: baseline
  annotations:
    # Vault is critical infra and is NOT meshed in dev: a Linkerd sidecar on the
    # Agent Injector (an admission webhook) breaks API-server -> webhook TLS calls,
    # and it complicates Raft (8201) + the unseal/health flow. Meshed app pods still
    # reach Vault in-cluster. Prod meshes Vault with opaque-ports/skip-inbound-ports.
    linkerd.io/inject: disabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: redis
  labels:
    name: redis
    pod-security.kubernetes.io/enforce: baseline
  annotations:
    linkerd.io/inject: enabled
---
# Reference MSSQL Always On AG (Phase 0.7). Out of the mesh, like other data stores
# (the architecture rules secure DB traffic with TLS at transport, not Linkerd); meshing
# would also require opaque-ports for both TDS (1433) and the AG endpoint (5022).
apiVersion: v1
kind: Namespace
metadata:
  name: mssql
  labels:
    name: mssql
    pod-security.kubernetes.io/enforce: baseline
  annotations:
    linkerd.io/inject: disabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: keycloak
  labels:
    name: keycloak
    pod-security.kubernetes.io/enforce: baseline
  annotations:
    linkerd.io/inject: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    name: observability
    pod-security.kubernetes.io/enforce: baseline
  annotations:
    linkerd.io/inject: enabled
