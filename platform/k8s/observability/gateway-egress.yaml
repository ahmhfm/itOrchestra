# ns-gateway is default-deny (egress). To proxy /grafana, the gateway must reach Grafana in
# the observability namespace. observability is NOT meshed, so the gateway's proxy dials
# Grafana's real pod port (3000) directly (no destination-proxy 4143 hop). observability is
# baseline (no default-deny), so its ingress is already open; only this egress rule is needed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-observability
  namespace: ns-gateway
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: observability }
      ports:
        - { protocol: TCP, port: 3000 }   # Grafana pod port (Service kps-grafana:80 -> 3000)
