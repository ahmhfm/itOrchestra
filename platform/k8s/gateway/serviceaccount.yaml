# Dedicated ServiceAccount for the gateway (security hardening). Replaces the shared 'default' SA
# so the workload has its own identity for Vault Kubernetes-auth, audit, and policy scoping.
# No RoleBinding is attached: the gateway never calls the Kubernetes API, so it carries ZERO
# cluster RBAC (least privilege). automount is on because the Vault Agent uses this SA's token to
# authenticate to Vault (the 'gateway' k8s-auth role binds exactly this SA).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway
  namespace: ns-gateway
  labels:
    app: gateway
automountServiceAccountToken: true
