# Public entry point for the whole platform. MetalLB assigns an external IP from the
# dev pool (10.178.95.240-250). TLS terminates inside the gateway (Kestrel on 8443).
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: ns-gateway
  labels:
    app: gateway
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
