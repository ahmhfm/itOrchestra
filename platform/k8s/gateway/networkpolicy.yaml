# Allow external clients to reach the gateway's HTTPS port. ns-gateway is default-deny
# ingress, so without this the LoadBalancer traffic would be dropped. Linkerd transparently
# redirects this inbound to the proxy; NetworkPolicy still matches the original port (8443).
# (kubelet health probes to 8080 come from the node and are permitted by Cilium's host path.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: ns-gateway
spec:
  podSelector:
    matchLabels:
      app: gateway
  policyTypes: [Ingress]
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 8443
