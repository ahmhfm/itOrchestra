# Dedicated ServiceAccount for CrewAI (security hardening). Replaces the shared 'default' SA so
# the workload has its own identity for Vault Kubernetes-auth, audit, and policy scoping.
# No RoleBinding is attached: CrewAI never calls the Kubernetes API, so it carries ZERO cluster
# RBAC (least privilege). automount is on because the Vault Agent uses this SA's token to log in
# (the 'crewai' k8s-auth role binds exactly this SA).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crewai
  namespace: ns-crewai
  labels:
    app: crewai
automountServiceAccountToken: true
