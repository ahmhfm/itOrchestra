# CrewAI orchestration service (Phase 0.10, dev). Meshed (Linkerd) gRPC microservice in the
# 'restricted' PSA. Config/secret are created by install-dev.sh from Vault + the 0.9 AI layer.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crewai
  namespace: ns-crewai
  labels:
    app: crewai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crewai
  template:
    metadata:
      labels:
        app: crewai
      annotations:
        linkerd.io/inject: enabled
        # Vault Agent Injector (Phase 0.12 hardening): the agent logs in with this pod's dedicated
        # 'crewai' SA token (k8s-auth role 'crewai' -> policy itorchestra-crewai) and renders the
        # service's runtime secrets to /vault/secrets/app.env BEFORE the app starts (init container).
        # The k8s 'crewai-secrets' env still applies as a fallback if injection is disabled (the CD/
        # Helm path) or unavailable. Agent runs as 10001 so the app user can read the rendered file.
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "crewai"
        vault.hashicorp.com/agent-run-as-user: "10001"
        vault.hashicorp.com/agent-run-as-group: "10001"
        vault.hashicorp.com/agent-inject-secret-app.env: "secret/data/itorchestra/shared/crewai"
        vault.hashicorp.com/agent-inject-template-app.env: |
          {{- with secret "secret/data/itorchestra/shared/crewai" -}}
          DB_PASSWORD={{ index .Data.data "db-password" }}
          {{ end -}}
          {{- with secret "secret/data/itorchestra/shared/ai" -}}
          QDRANT_API_KEY={{ index .Data.data "qdrant-api-key" }}
          {{ end -}}
    spec:
      serviceAccountName: crewai
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: crewai
          image: itorchestra/crewai:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { name: grpc, containerPort: 50051 }
          envFrom:
            - configMapRef: { name: crewai-config }
            - secretRef: { name: crewai-secrets }
          readinessProbe:
            grpc: { port: 50051 }
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 6
          livenessProbe:
            grpc: { port: 50051 }
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
