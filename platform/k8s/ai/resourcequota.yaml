# Consumption controls for the AI namespace (Phase 0.9). The ResourceQuota caps the whole
# namespace; the LimitRange supplies sane per-container defaults so no workload can grab the
# whole node. Per-user request rate limiting is enforced by the calling services (Polly) / a
# future internal AI BFF - there is no public gateway in front of AI.
# (dev/CPU profile: no GPU on this VM. When deploying the vLLM/GPU path, add
#  requests.nvidia.com/gpu / limits.nvidia.com/gpu here.)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ai-quota
  namespace: ai
  labels:
    app: ai
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 12Gi
    limits.cpu: "10"
    limits.memory: 20Gi
    persistentvolumeclaims: "12"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ai-limits
  namespace: ai
  labels:
    app: ai
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: 1Gi
      defaultRequest:
        cpu: "100m"
        memory: 256Mi
