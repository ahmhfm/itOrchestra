# Prometheus scrape target for vLLM (Phase 0.9). kube-prometheus-stack (Phase 0.8) is configured
# with serviceMonitorSelectorNilUsesHelmValues=false, so it picks this up cluster-wide. vLLM's
# /metrics is not behind the API key (only /v1/* is), so no credentials are needed.
# (Qdrant ships its own ServiceMonitor via the Helm chart - see qdrant/values.yaml.)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm
  namespace: ai
  labels:
    app: vllm
    release: kps
spec:
  namespaceSelector:
    matchNames: [ai]
  selector:
    matchLabels:
      app: vllm
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
