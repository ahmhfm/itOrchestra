# Internal Service for Ollama. Consumers embed via
# http://ollama.ai.svc.cluster.local:11434/api/embed (model: bge-m3). No external exposure.
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai
  labels:
    app: ollama
spec:
  type: ClusterIP
  selector:
    app: ollama
  ports:
    - { name: http, port: 11434, targetPort: 11434, protocol: TCP }
