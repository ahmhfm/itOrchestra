# Ollama (Phase 0.9) - CPU embedding server for bge-m3 (1024-dim, multilingual incl. Arabic).
# Kept on CPU so the 6 GB GPU stays dedicated to vLLM generation. Internal only. The bge-m3
# model is pulled once at provisioning (install-dev.sh) into a Longhorn-backed store.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: ai
  labels:
    app: ollama
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: itorchestra-longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai
  labels:
    app: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ollama
          image: ollama/ollama:latest   # pin in prod.
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 11434 }
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_MODELS
              value: /root/.ollama/models
            # Embeddings only -> keep a single model loaded, no parallelism blow-up.
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
          readinessProbe:
            httpGet: { path: /, port: 11434 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 11434 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - { name: models, mountPath: /root/.ollama }
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
