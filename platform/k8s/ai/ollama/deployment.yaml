# Ollama (Phase 0.9, dev/CPU profile) - serves BOTH the chat LLM (qwen2.5:1.5b) and the
# bge-m3 embedding model (1024-dim, multilingual incl. Arabic) on CPU, since this VM has no GPU.
# Internal only. Models are pulled once at provisioning (install-dev.sh) into a Longhorn store.
# (In production the chat LLM moves to vLLM on a GPU node; see vllm/ + docs/runbook-0.9.md.)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: ai
  labels:
    app: ollama
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: itorchestra-longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai
  labels:
    app: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ollama
          image: ollama/ollama:latest   # pin in prod.
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 11434 }
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_MODELS
              value: /root/.ollama/models
            # Allow chat + embedding models resident together; modest keep-alive on a busy VM.
            - name: OLLAMA_KEEP_ALIVE
              value: "1h"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "2"
          readinessProbe:
            httpGet: { path: /, port: 11434 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 11434 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "3Gi"
            limits:
              cpu: "4"
              memory: "6Gi"
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - { name: models, mountPath: /root/.ollama }
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
