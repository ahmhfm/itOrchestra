# MinIO (Phase 0.12): a single-instance S3-compatible endpoint that is *only* the storage
# protocol shim for Velero - the actual backup bytes land on the VM host disk via the hostPath
# PVC (minio-data). Single replica + Recreate strategy because the RWO hostPath volume cannot be
# shared. Runs as root under the namespace's 'privileged' PSA so the hostPath dir is writable;
# prod uses hardened/off-cluster object storage instead.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: backup
  labels:
    app: minio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
      annotations:
        linkerd.io/inject: disabled
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-12-18T13-15-44Z
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-creds
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-creds
                  key: root-password
          ports:
            - { name: s3,      containerPort: 9000 }
            - { name: console, containerPort: 9001 }
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /minio/health/live, port: 9000 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
