# Cilium Helm values - itOrchestra (works for both dev WSL2 and prod K3s).
#
# K3s runs without kube-proxy replacement here for maximum stability (esp. WSL2);
# Cilium coexists with the standard kube-proxy. Flip kubeProxyReplacement to "true"
# in prod once validated on real kernels.

kubeProxyReplacement: false

# K3s API is reachable on the node loopback; pointing Cilium at it avoids a
# chicken-and-egg dependency on the kube-proxy-managed ClusterIP during bootstrap.
k8sServiceHost: "127.0.0.1"
k8sServicePort: "6443"

ipam:
  mode: "cluster-pool"
  operator:
    clusterPoolIPv4PodCIDRList:
      - "10.42.0.0/16"
    clusterPoolIPv4MaskSize: 24

operator:
  replicas: 1            # single replica is fine for dev; bump for prod HA

# Enforce Kubernetes NetworkPolicy (our default-deny policies depend on this).
policyEnforcementMode: "default"

# Observability: Hubble for flow visibility (handy for verifying default-deny).
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

# Cilium replaces flannel; it provides the only CNI in the cluster.
cni:
  exclusive: true
