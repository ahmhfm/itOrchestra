# Cilium Helm values - itOrchestra (works for both the dev Ubuntu VM and prod K3s).
#
# K3s runs without kube-proxy replacement here for maximum compatibility;
# Cilium coexists with the standard kube-proxy. Flip kubeProxyReplacement to "true"
# in prod once validated on real kernels.

kubeProxyReplacement: false

# K3s API is reachable on the node loopback; pointing Cilium at it avoids a
# chicken-and-egg dependency on the kube-proxy-managed ClusterIP during bootstrap.
k8sServiceHost: "127.0.0.1"
k8sServicePort: "6443"

ipam:
  mode: "cluster-pool"
  operator:
    clusterPoolIPv4PodCIDRList:
      - "10.42.0.0/16"
    clusterPoolIPv4MaskSize: 24

operator:
  replicas: 1            # single replica is fine for dev; bump for prod HA

# Enforce Kubernetes NetworkPolicy (our default-deny policies depend on this).
policyEnforcementMode: "default"

# Observability: Hubble for flow visibility (handy for verifying default-deny).
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

# Cilium is the primary CNI. We chain Linkerd's CNI plugin on top of it so meshed
# pods in 'restricted' PodSecurity namespaces don't need the NET_ADMIN/NET_RAW
# proxy-init container. See docs/runbook-0.3.md.
#
# cni.exclusive=false      -> Cilium does not delete other CNI config files.
# cni.customConf + configMap -> Cilium writes the explicit [cilium-cni, linkerd-cni]
#   chain from the 'cni-configuration' ConfigMap (k8s/cluster/cilium/cni-chain-configmap.yaml)
#   instead of reconciling its conflist back to Cilium-only and stripping linkerd-cni.
cni:
  exclusive: false
  customConf: true
  configMap: cni-configuration

# Preserve the ClusterIP on packets so Linkerd's service discovery works even if
# socket-level load balancing is ever enabled (no-op while kubeProxyReplacement=false).
socketLB:
  hostNamespaceOnly: true
