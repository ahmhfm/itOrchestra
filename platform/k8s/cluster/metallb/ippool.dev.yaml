# MetalLB L2 pool - DEV (Ubuntu VM) EXAMPLE.
# The dev installer auto-detects the VM's primary NIC subnet at runtime and renders the
# real pool. This file documents the shape and can be applied manually if you pin a
# static dev subnet.
#
# Replace 172.20.0.240-172.20.0.250 with addresses inside your VM's LAN subnet.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: dev-pool
  namespace: metallb-system
spec:
  addresses:
    - "172.20.0.240-172.20.0.250"
  autoAssign: true
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: dev-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - dev-pool
