# MetalLB L2 pool - DEV (WSL2) EXAMPLE.
# In WSL the node subnet changes between reboots, so bootstrap/install.sh DETECTS the
# eth0 /24 at runtime and renders the real pool. This file documents the shape and can
# be applied manually if you pin a static WSL subnet.
#
# Replace 172.20.0.240-172.20.0.250 with addresses inside your WSL eth0 subnet.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: dev-pool
  namespace: metallb-system
spec:
  addresses:
    - "172.20.0.240-172.20.0.250"
  autoAssign: true
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: dev-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - dev-pool
