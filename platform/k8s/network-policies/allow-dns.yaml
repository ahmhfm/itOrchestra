# Re-allow DNS egress to CoreDNS (kube-system) for every application namespace.
# This is the ONLY egress allowed by default; service-to-service paths are opened
# explicitly per service in later steps. kube-system carries the well-known label
# kubernetes.io/metadata.name=kube-system (auto-added by the API server).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: ns-gateway
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: kube-system }
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
