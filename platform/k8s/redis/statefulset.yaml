# Redis (dev): single-node StatefulSet, official image, AOF persistence on a Longhorn PVC.
# Out of the Linkerd mesh (shared infra; secured by AUTH now, TLS in prod). Internal only.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: redis
  labels:
    app: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999          # 'redis' user in the official image.
        runAsGroup: 999
        fsGroup: 999            # make the Longhorn PVC writable by redis.
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:8.8.0
          imagePullPolicy: IfNotPresent
          command: ["redis-server"]
          args: ["/etc/redis/redis.conf", "--requirepass", "$(REDIS_PASSWORD)"]
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: password
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/redis
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: redis-config
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: itorchestra-longhorn
        resources:
          requests:
            storage: 2Gi
