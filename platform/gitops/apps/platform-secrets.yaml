# App-of-Apps child (Phase 0.13.1). Manages the External Secrets Operator wiring: the Vault-backed
# ClusterSecretStore that every service's ExternalSecret will reference. ESO itself is installed by
# Terraform (bootstrap); the secret material stays in Vault - only references live in Git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: itorchestra
  source:
    repoURL: https://github.com/ahmhfm/itOrchestra.git
    targetRevision: main
    path: platform/gitops/components/secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
