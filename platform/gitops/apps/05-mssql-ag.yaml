# App-of-Apps child (Phase 0.12.2 - wave 5, data store). Adopts the MSSQL Always On AG manifests
# (StatefulSet, mssql-conf ConfigMap, Service, NetworkPolicy ingress-fence) into GitOps.
#
# NOT GitOps-managed (imperative, owned by k8s/mssql-ag/install-dev.sh): the SA/AG credentials
# Secret(s), the Always On AG bootstrap (endpoints/certs/seeding), and per-DB creation. ArgoCD
# manages only the declarative manifests; the live data + AG topology stay untouched.
#
# Auto-sync enabled after a clean adoption diff review (0.12.2). prune is kept FALSE so it never
# touches the StatefulSet/PVCs; /spec/volumeClaimTemplates is ignored to avoid phantom diffs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mssql-ag
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: itorchestra
  source:
    repoURL: https://github.com/ahmhfm/itOrchestra.git
    targetRevision: main
    path: platform/k8s/mssql-ag
  destination:
    server: https://kubernetes.default.svc
    namespace: mssql
  ignoreDifferences:
    # See redis app: StatefulSet volumeClaimTemplates PVC defaulting causes a phantom OutOfSync under
    # ServerSideApply. volumeClaimTemplates are immutable on a live StatefulSet, so this is safe.
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
  syncPolicy:
    # Adopted cleanly in 0.12.2. Auto-sync ON: selfHeal reverts drift; prune=FALSE so the AG
    # StatefulSet and its PVCs are never auto-deleted (database safety).
    automated:
      selfHeal: true
      prune: false
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
