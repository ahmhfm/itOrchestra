# ESO ClusterSecretStore -> HashiCorp Vault (KV v2 mounted at secret/). ESO authenticates to Vault
# with its own ServiceAccount through the Vault Kubernetes-auth role 'external-secrets' (seeded in
# k8s/vault/install-dev.sh; policy = read-only on secret/data/itorchestra/*). Cluster-scoped so an
# ExternalSecret in ANY namespace can reference it. Vault is out of mesh (ClusterIP) and reached on
# 8200 - the vault ingress fence allows the external-secrets namespace.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
