apiVersion: v1
kind: Service
metadata:
  name: {{ include "itorchestra-service.fullname" . }}
  labels:
    {{- include "itorchestra-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "itorchestra-service.selectorLabels" . | nindent 4 }}
  ports:
    - name: {{ .Values.service.portName }}
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
