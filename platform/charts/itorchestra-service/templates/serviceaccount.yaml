{{- if .Values.serviceAccount.create -}}
# Dedicated identity for this service (replaces the namespace 'default' SA). Intentionally has no
# Role/RoleBinding - the workload never talks to the Kubernetes API, so it gets zero cluster RBAC.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "itorchestra-service.serviceAccountName" . }}
  labels:
    {{- include "itorchestra-service.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
