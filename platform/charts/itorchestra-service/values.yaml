# Defaults for the generic itOrchestra microservice chart. Override per service/environment in
# platform/deploy/<service>/values-<env>.yaml. The CD pipeline injects image.repository/tag.
nameOverride: ""
fullnameOverride: ""

replicas: 1

# Dedicated ServiceAccount per service (security hardening). Each workload gets its OWN identity
# instead of the namespace 'default' SA - used for Vault Kubernetes-auth, audit, and policy
# scoping. No Role/RoleBinding is created (these services do not call the Kubernetes API, so they
# carry ZERO cluster RBAC = least privilege). automount stays on because the Vault Agent uses the
# SA token to log in to Vault.
serviceAccount:
  create: true
  name: ""                              # defaults to the release fullname
  annotations: {}
  automountServiceAccountToken: true

image:
  repository: ghcr.io/ahmhfm/itorchestra-service   # overridden by CD (--set image.repository)
  tag: latest                                        # overridden by CD (--set image.tag, a signed digest tag)
  pullPolicy: IfNotPresent

# Meshed by default (Linkerd mTLS) - matches the platform's "all pod-to-pod traffic is meshed" rule.
linkerd:
  inject: true

# Extra pod annotations, merged with the Linkerd annotation. This is the generic hook for Vault
# Agent runtime secret injection (the CD path) - a service opts in via its values-<env>.yaml, e.g.:
#   podAnnotations:
#     vault.hashicorp.com/agent-inject: "true"
#     vault.hashicorp.com/role: "<service>"               # k8s-auth role bound to this svc's SA
#     vault.hashicorp.com/agent-inject-secret-app.env: "secret/data/itorchestra/<svc>"
#     vault.hashicorp.com/agent-inject-template-app.env: |
#       {{- with secret "secret/data/itorchestra/<svc>" -}}
#       KEY={{ index .Data.data "key" }}
#       {{ end -}}
# Keep the k8s Secret envFrom as a fallback; the app should prefer /vault/secrets/* when present.
podAnnotations: {}

# Port the container listens on (gRPC 50051 or HTTP 8080, per service).
containerPort: 8080

service:
  type: ClusterIP        # internal only; never LoadBalancer/NodePort (external traffic is via YARP)
  port: 8080
  # Linkerd treats a port named 'grpc' as HTTP/2. Use 'http' for REST services.
  portName: http

# Probe style: grpc | http | none.
probes:
  type: http
  path: /healthz
  initialDelaySeconds: 20
  periodSeconds: 15
  failureThreshold: 6

# Pulled from ConfigMaps/Secrets created out-of-band (e.g. by the service installer / Vault).
envFrom: []
#  - configMapRef: { name: <svc>-config }
#  - secretRef: { name: <svc>-secrets }
env: []
#  - { name: LOG_LEVEL, value: "INFO" }

resources:
  requests: { cpu: "100m", memory: "256Mi" }
  limits:   { cpu: "1",    memory: "1Gi" }

# 'restricted' Pod Security Standard defaults.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]

# Optional chart-managed NetworkPolicy. Disabled by default because services already ship their
# own fine-grained policies; enable to let the chart render a default-deny + ingress allow-list.
networkPolicy:
  enabled: false
  ingressFromNamespaces: []
  ingressPort: 0
